<body>
  <!-- Loader inicial -->
  <div id="app-loader">
    <div class="loader">
      <div class="justify-content-center jimu-primary-loading"></div>
    </div>
  </div>
  <style>
  #app-loader {
    position: fixed;
    inset: 0;
    background: #ffffff;
    z-index: 99999;
  }
  .loader {
    position: absolute;
    inset: 0;
  }
  .jimu-primary-loading:before,
  .jimu-primary-loading:after {
    position: absolute;
    top: 0;
    content: '';
  }
  .jimu-primary-loading:before {
    left: -19.992px;
  }
  .jimu-primary-loading:after {
    left: 19.992px;
    animation-delay: 0.32s !important;
  }
  .jimu-primary-loading:before,
  .jimu-primary-loading:after,
  .jimu-primary-loading {
    background: #076fe5; /* podés cambiar al color de tu marca */
    animation: loading-keys-app-loading 0.8s infinite ease-in-out;
    width: 13.6px;
    height: 32px;
  }
  .jimu-primary-loading {
    text-indent: -9999em;
    margin: auto;
    position: absolute;
    right: calc(50% - 6.8px);
    top: calc(50% - 16px);
    animation-delay: 0.16s !important;
  }
  @keyframes loading-keys-app-loading {
    0%, 80%, 100% {
      opacity: .75;
      box-shadow: 0 0 #076fe5;
      height: 32px;
    }
    40% {
      opacity: 1;
      box-shadow: 0 -8px #076fe5;
      height: 40px;
    }
  }
</style>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
